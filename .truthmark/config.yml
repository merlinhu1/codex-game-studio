version: 2
platforms:
  - codex
  - opencode
truthmark:
  workspace: docs/truthmark
  generated:
    portal:
      enabled: true
instruction_targets:
  - AGENTS.md
frontmatter:
  required: []
  recommended:
    - status
    - last_reviewed
ignore:
  - node_modules/**
  - vendor/**
  - dist/**
  - build/**
